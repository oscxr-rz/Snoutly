<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="form-card">

    <div class="field">
      <label>Correo electrónico:</label>
      <input type="email" [ngModel]="correo()" (ngModelChange)="correo.set($event)" autocomplete="email" />
    </div>

    <div class="field">
      <label>Contraseña:</label>
      <div class="input-icon-wrap">
        <input [type]="passwordType" [ngModel]="password()" (ngModelChange)="password.set($event)"
          autocomplete="current-password" />
        <button class="icon-btn" (click)="showPassword.set(!showPassword())">
          <ion-icon [name]="showPassword() ? 'eye-outline' : 'eye-off-outline'" />
        </button>
      </div>
    </div>

    <ion-button expand="block" class="btn-siguiente" [disabled]="loading()" (click)="onSubmit()">
      @if (loading()) {
      <ion-spinner name="crescent" />
      } @else {
      Siguiente
      }
    </ion-button>

  </div>

  <p class="register-link">
    ¿No tienes una cuenta aún? <a (click)="crearCuenta()">Crear cuenta</a>
  </p>
</ion-content>
