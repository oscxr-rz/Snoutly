<!-- ══════════════════════════════════════════════════
     TOPBAR
     ══════════════════════════════════════════════════ -->
<div class="lg-topbar">
  <div class="lg-brand">
    <ion-icon name="paw-outline" class="lg-brand-paw" />
    <span class="lg-brand-name">Snoutly</span>
  </div>
</div>

<ion-content [fullscreen]="true" class="lg-content">

  <!-- ══════════════════════════════════════════════════
       HERO BAND
       ══════════════════════════════════════════════════ -->
  <div class="lg-hero">
    <span class="lg-hero-eyebrow">Bienvenido</span>
    <h1 class="lg-hero-title">Iniciar sesión</h1>
  </div>

  <!-- ══════════════════════════════════════════════════
       BODY
       ══════════════════════════════════════════════════ -->
  <div class="lg-body">

    <div class="lg-form">

      <!-- Correo -->
      <div class="lg-field">
        <label class="lg-label">Correo electrónico</label>
        <input
          class="lg-input"
          type="email"
          [ngModel]="correo()"
          (ngModelChange)="correo.set($event)"
          placeholder="Ej. usuario@correo.com"
          autocomplete="email"
        />
      </div>

      <!-- Contraseña -->
      <div class="lg-field">
        <label class="lg-label">Contraseña</label>
        <div class="lg-input-wrap">
          <input
            class="lg-input"
            [type]="passwordType"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="Mínimo 6 caracteres"
            autocomplete="current-password"
          />
          <button class="lg-eye-btn" (click)="showPassword.set(!showPassword())" type="button">
            <ion-icon [name]="showPassword() ? 'eye-outline' : 'eye-off-outline'" />
          </button>
        </div>
      </div>

      <!-- Botón -->
      <button
        class="lg-btn-submit"
        [disabled]="loading()"
        (click)="onSubmit()"
      >
        @if (loading()) {
          <ion-spinner name="crescent" />
        } @else {
          Siguiente
        }
      </button>

    </div>

    <!-- Link registro -->
    <p class="lg-register-link">
      ¿No tienes una cuenta aún?
      <a (click)="crearCuenta()">Crear cuenta</a>
    </p>

  </div>

</ion-content>
